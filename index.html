<!DOCTYPE html>
<html>
<head>
  <title>QuickPress</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f2f2f2;
    }

    .header {
      background: #007bff;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      width: 100%;
      padding: 15px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div class="header">QuickPress 🚀</div>

<div class="card">
  <h3>Start Order</h3>
  <button onclick="startOrder()">Start</button>
</div>

<div class="card">
  <h4>Price List</h4>
  <p>Shirt ₹15</p>
  <p>Pant ₹20</p>
  <p>Saree ₹30</p>
</div>

<script>
function startOrder() {
  alert("Order screen coming next 🚀");
}
</script>

</body>
</html>
