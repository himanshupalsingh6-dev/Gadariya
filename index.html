<!DOCTYPE html>
<html>
<head>
  <title>QuickPress</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #f2f2f2; }
    .header { background: #007bff; color: white; padding: 15px; text-align: center; }
    .screen { display: none; }
    .active { display: block; }
    .card { background: white; margin: 15px; padding: 15px; border-radius: 12px; }
    button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 10px; margin-top: 10px; }
    .qty { display: flex; justify-content: space-between; margin: 10px 0; }
    input { width:100%; padding:10px; margin-top:10px; }
  </style>
</head>

<body>

<div class="header">QuickPress 🚀</div>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="card">
    <h3>Start</h3>
    <button onclick="show('category')">Start Order</button>
  </div>
</div>

<!-- CATEGORY -->
<div id="category" class="screen">
  <div class="card">
    <h3>Select Service</h3>
    <button onclick="show('product')">Ironing</button>
  </div>
</div>

<!-- PRODUCT -->
<div id="product" class="screen">
  <div class="card">
    <h3>Select Clothes</h3>

    <div class="qty">Shirt 
      <button onclick="change('shirt',-1)">-</button>
      <span id="shirt">0</span>
      <button onclick="change('shirt',1)">+</button>
    </div>

    <div class="qty">Pant 
      <button onclick="change('pant',-1)">-</button>
      <span id="pant">0</span>
      <button onclick="change('pant',1)">+</button>
    </div>

    <div class="qty">Saree 
      <button onclick="change('saree',-1)">-</button>
      <span id="saree">0</span>
      <button onclick="change('saree',1)">+</button>
    </div>

    <h3>Total ₹<span id="total">0</span></h3>

    <button onclick="showCart()">Go to Cart</button>
  </div>
</div>

<!-- CART -->
<div id="cart" class="screen">
  <div class="card">
    <h3>Cart</h3>
    <p>Shirt: <span id="cshirt"></span></p>
    <p>Pant: <span id="cpant"></span></p>
    <p>Saree: <span id="csaree"></span></p>
    <h3>Total ₹<span id="ctotal"></span></h3>

    <button onclick="show('checkout')">Checkout</button>
  </div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="screen">
  <div class="card">
    <h3>Details</h3>
    <input id="name" placeholder="Your Name">
    <input id="phone" placeholder="Phone Number">
    <input id="address" placeholder="Address">

    <button onclick="sendOrder()">Place Order</button>
  </div>
</div>

<script>
let shirt=0, pant=0, saree=0;

function show(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
}

function change(item,val){
  if(item=="shirt") shirt=Math.max(0,shirt+val);
  if(item=="pant") pant=Math.max(0,pant+val);
  if(item=="saree") saree=Math.max(0,saree+val);

  document.getElementById("shirt").innerText=shirt;
  document.getElementById("pant").innerText=pant;
  document.getElementById("saree").innerText=saree;

  let total = shirt*15 + pant*20 + saree*30;
  document.getElementById("total").innerText=total;
}

function showCart(){
  document.getElementById("cshirt").innerText=shirt;
  document.getElementById("cpant").innerText=pant;
  document.getElementById("csaree").innerText=saree;

  let total = shirt*15 + pant*20 + saree*30;
  document.getElementById("ctotal").innerText=total;

  show('cart');
}

function sendOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  let total = shirt*15 + pant*20 + saree*30;

  let message = `New Order 🚀
Name: ${name}
Phone: ${phone}
Address: ${address}

Shirt: ${shirt}
Pant: ${pant}
Saree: ${saree}

Total: ₹${total}`;

  let url = "https://wa.me/919258730561?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}
</script>

</body>
</html>
